name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Build macOS .app
        run: wails3 package

      - name: Zip .app bundle
        run: |
          cd bin
          zip -r ../notify-macos-arm64.zip notify-me.app

      - uses: actions/upload-artifact@v4
        with:
          name: notify-macos-arm64
          path: notify-macos-arm64.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm install --no-audit --no-fund
          npm run build

      - name: Restore .gitkeep
        shell: pwsh
        run: if (-not (Test-Path frontend/dist/.gitkeep)) { New-Item -Path frontend/dist/.gitkeep -ItemType File | Out-Null }

      - name: Build Windows .exe
        shell: pwsh
        env:
          CGO_ENABLED: 1
        run: |
          if (-not (Test-Path build\bin)) { New-Item -Path build\bin -ItemType Directory | Out-Null }
          go build -ldflags="-H windowsgui" -o build\bin\notify-me.exe .

      - name: Zip Windows binary
        shell: pwsh
        run: Compress-Archive -Path build\bin\notify-me.exe -DestinationPath notify-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: notify-windows-amd64
          path: notify-windows-amd64.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/notify-macos-arm64/notify-macos-arm64.zip
            artifacts/notify-windows-amd64/notify-windows-amd64.zip
          generate_release_notes: true
