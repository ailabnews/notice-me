<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>notify-me</title>
    <script type="module" src="/assets/main-B1fLRpf2.js"></script>
    <link rel="modulepreload" href="/assets/runtime-dom.esm-bundler-D3YbddaS.js">
    <link rel="modulepreload" href="/assets/markdown-DYDMKAex.js">
    <link rel="stylesheet" href="/assets/markdown-CMwTLlDf.css">
    <link rel="stylesheet" href="/assets/main-BLHBNVoe.css">
  </head>
  <body>
    <div id="app"></div>
    <script>
      // Diagnostic: surface any JS errors in the page itself so we can see
      // them even without access to WebView2 devtools.
      window.onerror = function(msg, src, line, col, err) {
        var d = document.createElement('pre');
        d.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#fee;color:#c00;padding:8px;font-size:12px;z-index:99999;white-space:pre-wrap;margin:0';
        d.textContent = 'JS ERROR: ' + msg + (src ? ' (' + src + ':' + line + ':' + col + ')' : '');
        document.body.appendChild(d);
      };
      window.addEventListener('unhandledrejection', function(e) {
        var d = document.createElement('pre');
        d.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#fee;color:#c00;padding:8px;font-size:12px;z-index:99999;white-space:pre-wrap;margin:0';
        d.textContent = 'UNHANDLED PROMISE: ' + (e.reason && e.reason.stack || e.reason || e);
        document.body.appendChild(d);
      });
    </script>
  </body>
</html>
